version: '3'

services:
  nginx:
    build:
      context: './nginx'
    volumes:
      - ${WEB_ROOT}:/var/www/html
    ports:
      - "${NGINX_HTTP_PORT}:80"
      - "${NGINX_HTTPS_PORT}:443"
    depends_on:
      - php-fpm
    tty: true
    restart: always
networks:
  default:
    external:
      name: ${USER_NETWORK}
